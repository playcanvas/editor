name: Test Suite / CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: test-suite
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 24.x
            - run: npm ci
            - run: npm run type:check

    lint:
        name: Lint
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: test-suite
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 24.x
            - run: npm ci
            - run: npm run lint
